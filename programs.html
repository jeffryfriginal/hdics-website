<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programs — Holy Deliverance Integrated Christian School</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="shared.css">
    <style>
        .programs-section { background: var(--cream); }

        .programs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.75rem;
        }
        .program-card {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--cream-dark);
            transition: transform 0.25s, box-shadow 0.25s;
        }
        .program-card:hover { transform: translateY(-6px); box-shadow: 0 20px 50px rgba(15,32,64,0.14); }
        .program-card-photo {
            width: 100%;
            aspect-ratio: 4 / 3;
            object-fit: cover;
            display: block;
        }
        .program-card-body { padding: 1.75rem; }
        .program-card-grade {
            display: inline-block;
            background: rgba(201,146,42,0.1);
            color: var(--gold);
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.28rem 0.7rem;
            border-radius: 100px;
            margin-bottom: 0.85rem;
        }
        .program-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 0.75rem;
        }
        .program-card p {
            font-size: 0.93rem;
            color: var(--gray-text);
            line-height: 1.75;
            font-weight: 300;
        }
    </style>
</head>
<body data-page="programs">

    <div id="nav-placeholder"></div>

    <div class="page-banner">
        <div class="page-banner-inner">
            <p class="page-banner-crumb"><a href="index.html">Home</a> / Programs</p>
            <h1>Programs</h1>
            <p>What your child will learn and grow through at every stage.</p>
        </div>
    </div>

    <section class="section programs-section">
        <div class="section-inner">
            <p class="section-label" style="text-align:center;">Academic Programs</p>
            <h2 class="section-title" style="text-align:center; margin-bottom:2.5rem;">A Path for Every Age</h2>

            <div class="programs-grid" id="programs-grid">
                <p style="color:rgba(15,32,64,0.4); font-size:0.9rem;">Loading…</p>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <script>
        fetch('data/programs.json?v=' + Date.now())
            .then(res => res.json())
            .then(data => {
                const grid = document.getElementById('programs-grid');
                grid.innerHTML = data.levels.map(lvl => `
                    <div class="program-card">
                        <img class="program-card-photo" src="${lvl.photo}" alt="${lvl.name}" loading="lazy">
                        <div class="program-card-body">
                            <span class="program-card-grade">${lvl.grades}</span>
                            <h3>${lvl.name}</h3>
                            <p>${lvl.description}</p>
                        </div>
                    </div>
                `).join('');
            })
            .catch(err => {
                document.getElementById('programs-grid').innerHTML = '<p style="color:rgba(15,32,64,0.4);">Unable to load programs right now.</p>';
                console.error('Programs data failed to load:', err);
            });
    </script>

    <script src="shared.js"></script>

</body>
</html>
