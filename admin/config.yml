# Use DecapBridge classic auth (required)
backend:
  name: git-gateway
  repo: jeffryfriginal/hdics-website
  branch: main
  identity_url: https://auth.decapbridge.com/sites/6f7b4db4-1c62-4a8a-b2ed-f6f42e65d61d
  gateway_url: https://gateway.decapbridge.com
  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge
# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg
# Add site links in Decap CMS (optional)
site_url: https://batangholy.netlify.app

media_folder: "uploads"
public_folder: "uploads"

collections:
  - name: "board"
    label: "Board Members"
    files:
      - file: "data/board.json"
        label: "Board Members"
        name: "board"
        fields:
          - label: "Members"
            name: "members"
            widget: "list"
            summary: "{{name}} — {{role}}"
            fields:
              - { label: "Full Name", name: "name", widget: "string" }
              - { label: "Role / Position", name: "role", widget: "string" }
              - { label: "Photo", name: "photo", widget: "image" }

  - name: "gallery"
    label: "Gallery"
    files:
      - file: "data/gallery.json"
        label: "Gallery Carousels"
        name: "gallery"
        fields:
          - label: "Carousels"
            name: "carousels"
            widget: "list"
            summary: "{{title}}"
            fields:
              - { label: "Carousel Title", name: "title", widget: "string" }
              - label: "Images"
                name: "images"
                widget: "list"
                field: { label: "Image", name: "image", widget: "image" }

  - name: "enroll"
    label: "Enrollment Levels"
    files:
      - file: "data/enroll.json"
        label: "Enrollment Levels"
        name: "enroll"
        fields:
          - label: "Levels"
            name: "levels"
            widget: "list"
            summary: "{{name}}"
            fields:
              - { label: "Level Name", name: "name", widget: "string" }
              - { label: "Grade Range", name: "grades", widget: "string" }
              - { label: "Photo", name: "photo", widget: "image" }
              - { label: "Google Form URL", name: "form_url", widget: "string" }

  - name: "news"
    label: "Homepage News"
    files:
      - file: "data/news.json"
        label: "News Items"
        name: "news"
        fields:
          - label: "Items"
            name: "items"
            widget: "list"
            summary: "{{title}}"
            fields:
              - { label: "Tag / Category", name: "tag", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Link (e.g. Facebook post)", name: "link", widget: "string" }

  - name: "hero"
    label: "Homepage Hero"
    files:
      - file: "data/hero.json"
        label: "Hero Section"
        name: "hero"
        fields:
          - { label: "Eyebrow Text", name: "eyebrow", widget: "string" }
          - { label: "Heading — First Word(s)", name: "heading_start", widget: "string" }
          - { label: "Heading — Emphasized Word (gold italic)", name: "heading_emphasis", widget: "string" }
          - { label: "Heading — Second Line", name: "heading_line2", widget: "string" }
          - { label: "Subheading", name: "subheading", widget: "text" }
